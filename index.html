<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda de Reuniões · Closers · Ao Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Bruta Pro (fonte de marca da PSA) — self-hosted em /fonts.
     Usada nos números e títulos (display). Fallback: Archivo Expanded. */
  @font-face{
    font-family:"Bruta Pro";
    src:local("Bruta Pro Compressed ExtraBold"),
        url("fonts/brutaprocompressed-extrabold.otf") format("opentype");
    font-weight:100 900;
    font-style:normal;
    font-display:swap;
  }

  :root{
    /* ---- Paleta PSA: laranja + azul + branco sobre fundo grafite ---- */
    --bg:#0b0b0e;
    --bg-2:#101014;
    --panel:#141417;
    --panel-2:#1a1a20;
    --line:#26262c;
    --ink:#f4f4f6;
    --muted:#c4c4cd;
    --dim:#8a8a93;
    --shadow:none;
    --shadow-sm:none;

    /* cores de marca */
    --orange:#ff6a1a;
    --orange-2:#ffa24d;
    --blue:#5aa9ff;

    /* semáforo de status */
    --now:#FF6A00;      /* em andamento -> laranja */
    --done:#3AAF3A;     /* realizada    -> verde */
    --sched:#FFB703;    /* agendada     -> âmbar */
    --next:#0f5132;     /* futura       -> verde escuro */
    --miss:#ff5a5a;     /* no-show      -> vermelho */

    --num:'Bruta Pro','Archivo',sans-serif;
    --sans:'Archivo', system-ui, sans-serif;
    --inter:'Inter', system-ui, sans-serif;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:var(--sans);
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(255,106,26,.12), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(90,169,255,.10), transparent 55%),
      var(--bg);
    color:var(--ink);
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- HEADER ---------- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:13px 30px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, var(--bg-2), transparent);
    flex:0 0 auto;
  }
  .brand{display:flex;align-items:center;gap:16px}
  .live-dot{
    width:14px;height:14px;border-radius:50%;background:var(--now);
    box-shadow:0 0 0 0 rgba(255,106,26,.6);
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,106,26,.55)}
    70%{box-shadow:0 0 0 16px rgba(255,106,26,0)}
    100%{box-shadow:0 0 0 0 rgba(255,106,26,0)}
  }
  .brand h1{
    font-family:var(--num);font-weight:700;font-size:32px;letter-spacing:.10em;
    text-transform:uppercase;line-height:1;
  }
  .brand small{
    display:block;color:var(--muted);font-size:11px;letter-spacing:.30em;
    text-transform:uppercase;font-weight:600;margin-top:5px;
  }
  .clock{text-align:right}

  /* abas de segmento (B2B / B2C) e de período (Hoje / Amanhã / ...) */
  .controls{display:flex;align-items:center;gap:12px}
  .tabs{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:5px}
  .tab{
    font-family:var(--num);font-weight:700;font-size:22px;letter-spacing:.10em;text-transform:uppercase;
    color:var(--muted);padding:7px 26px;border-radius:9px;cursor:pointer;border:none;background:transparent;transition:.2s;
  }
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--orange);color:#0b0b0e}
  /* período: fonte um pouco menor e destaque azul (diferencia do segmento) */
  .tabs.periodo .tab{font-size:17px;padding:7px 16px;letter-spacing:.06em}
  .tabs.periodo .tab.active{background:var(--ink);color:#0b0b0e}
  .clock .time{
    font-family:var(--num);font-weight:700;font-size:46px;line-height:.9;
    font-variant-numeric:tabular-nums;letter-spacing:.02em;
  }
  .clock .date{color:var(--muted);font-size:13px;text-transform:capitalize;font-weight:500;margin-top:6px}

  /* ---------- KPIs ---------- */
  .kpis{
    display:grid;grid-template-columns:repeat(7,1fr);gap:11px;
    padding:12px 30px;flex:0 0 auto;
  }
  .kpi{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:11px 16px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;
    box-shadow:var(--shadow-sm);
  }
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--c)}
  .kpi .big{font-family:var(--num);font-weight:700;font-size:46px;line-height:.85;color:var(--c);font-variant-numeric:tabular-nums}
  .kpi .lbl{color:var(--muted);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600}

  /* ---------- GRID DE CLOSERS ---------- */
  .grid{
    flex:1 1 auto;display:grid;gap:13px;padding:4px 30px 16px;overflow:hidden;
    grid-template-columns:repeat(4,minmax(0,1fr));
    grid-template-rows:repeat(2,minmax(0,1fr));
  }
  .card{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:18px;
    padding:15px 16px 14px;display:flex;flex-direction:column;min-height:0;
    transition:border-color .4s, box-shadow .4s;
  }
  .card.is-now{border-color:rgba(255,106,26,.55);box-shadow:0 0 34px rgba(255,106,26,.14)}

  .who{display:flex;align-items:center;gap:13px;margin-bottom:14px}
  .avatar{
    width:52px;height:52px;border-radius:14px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--num);font-weight:700;font-size:24px;color:#0b0b0e;
  }
  .who .name{font-family:var(--inter);font-weight:700;font-size:24px;line-height:1.05;letter-spacing:0}
  .badge{
    margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    padding:6px 11px;border-radius:999px;display:flex;align-items:center;gap:7px;white-space:nowrap;
  }
  .badge .b-dot{width:8px;height:8px;border-radius:50%}
  .badge.now{color:var(--now);background:rgba(255,106,26,.14)}
  .badge.now .b-dot{background:var(--now);animation:pulse 1.6s infinite}
  .badge.free{color:var(--muted);background:rgba(196,196,205,.10)}
  .badge.free .b-dot{background:var(--muted)}

  /* mini stats */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
  .stat{background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:11px;padding:9px 6px;text-align:center}
  .stat .n{font-family:var(--num);font-weight:700;font-size:36px;line-height:.85;color:var(--c);font-variant-numeric:tabular-nums}
  .stat .t{color:var(--muted);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-top:5px}

  /* agenda do dia (todas as reuniões do closer) — preenche o card, sem scroll */
  .agenda{flex:1 1 auto;margin-top:16px;display:flex;flex-direction:column;gap:8px;overflow:hidden;min-height:0}
  .appt{
    display:flex;align-items:center;gap:14px;padding:10px 15px;border-radius:12px;flex:1 1 0;
    min-height:0;overflow:hidden;
    background:rgba(0,0,0,.32);border:1px solid var(--line);border-left:5px solid var(--c);
    color:var(--ink);text-decoration:none;transition:background .2s, border-color .2s;
  }
  a.appt[href]{cursor:pointer}
  a.appt[href]:hover{background:rgba(255,255,255,.06);border-color:var(--c)}
  .appt .time{display:flex;flex-direction:column;line-height:1;flex:0 0 auto;font-variant-numeric:tabular-nums;text-align:center;min-width:58px;font-family:var(--inter)}
  .appt .time .dia{color:var(--muted);font-size:12px;font-weight:600;margin-bottom:5px;white-space:nowrap}
  .appt .time .ini{font-family:var(--inter);font-weight:700;font-size:24px;color:var(--c)}
  .appt .time .fim{color:var(--dim);font-size:13px;margin-top:4px}
  .appt .info{min-width:0;flex:1;overflow:hidden}
  .appt .info .t{font-weight:600;font-size:18px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .appt .info .c{color:var(--muted);font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
  .appt .tag{margin-left:auto;flex:0 0 auto;font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--c);white-space:nowrap}
  .appt.past{opacity:.5}
  .appt.cancel .info .t{text-decoration:line-through}
  .appt.live{background:rgba(255,106,26,.16);border-color:rgba(255,106,26,.4);box-shadow:0 0 22px rgba(255,106,26,.16)}
  .appt.live .tag{display:flex;align-items:center;gap:7px}
  .appt.live .tag::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--now);animation:pulse 1.6s infinite}
  .agenda.empty-day{align-items:center;justify-content:center;color:var(--muted);font-size:15px}

  /* densidade: 5–6 reuniões (compacto) — some a hora de término, fontes menores */
  .agenda.compact{gap:6px}
  .agenda.compact .appt{gap:12px;padding:8px 14px}
  .agenda.compact .appt .time{min-width:48px}
  .agenda.compact .appt .time .dia{font-size:11px;margin-bottom:3px}
  .agenda.compact .appt .time .ini{font-size:21px}
  .agenda.compact .appt .time .fim{display:none}
  .agenda.compact .appt .info .t{font-size:16px}
  .agenda.compact .appt .info .c{font-size:12.5px;margin-top:2px}
  .agenda.compact .appt .tag{font-size:11px}

  /* densidade: 7+ reuniões (denso) — título e contato na mesma linha */
  .agenda.dense{gap:5px}
  .agenda.dense .appt{gap:11px;padding:7px 13px}
  .agenda.dense .appt .time{min-width:44px}
  .agenda.dense .appt .time .dia{font-size:10px;margin-bottom:2px}
  .agenda.dense .appt .time .ini{font-size:19px}
  .agenda.dense .appt .time .fim{display:none}
  .agenda.dense .appt .info{display:flex;flex-direction:row;align-items:baseline;gap:9px;min-width:0}
  .agenda.dense .appt .info .t{font-size:15px;flex:0 1 auto}
  .agenda.dense .appt .info .c{font-size:12px;margin-top:0;flex:1 1 auto;min-width:0}
  .agenda.dense .appt .tag{font-size:10.5px}

  /* muitas reuniões (9+): 2 colunas para caber tudo sem estourar/cortar */
  .agenda.grade{
    display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:minmax(0,1fr);
    gap:6px 10px;align-content:stretch;
  }
  .agenda.grade .appt{gap:10px;padding:6px 12px;border-left-width:4px}
  .agenda.grade .appt .time{min-width:42px}
  .agenda.grade .appt .time .dia{display:none}
  .agenda.grade .appt .time .ini{font-size:18px}
  .agenda.grade .appt .time .fim{display:none}
  .agenda.grade .appt .info{display:flex;flex-direction:row;align-items:baseline;gap:8px;min-width:0}
  .agenda.grade .appt .info .t{font-size:14px;flex:0 1 auto}
  .agenda.grade .appt .info .c{font-size:11.5px;margin-top:0;flex:1 1 auto;min-width:0}
  .agenda.grade .appt .tag{font-size:10px}

  /* KPI clicável */
  .kpi{cursor:pointer;transition:border-color .2s, transform .1s}
  .kpi:hover{border-color:var(--c)}
  .kpi:active{transform:scale(.99)}

  /* ---------- MODAL (pop-up de reuniões por status) ---------- */
  .modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:30px}
  .modal[hidden]{display:none}
  .modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(2px)}
  .modal-box{
    position:relative;z-index:1;width:min(820px,92vw);max-height:82vh;display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
  .modal-title{font-family:var(--num);font-weight:700;font-size:22px;letter-spacing:.04em;text-transform:uppercase}
  .modal-title b{color:var(--c)}
  .modal-close{background:transparent;border:none;color:var(--muted);font-size:28px;line-height:1;cursor:pointer;padding:0 4px}
  .modal-close:hover{color:var(--ink)}
  .modal-list{overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .modal-empty{color:var(--muted);text-align:center;padding:28px;font-size:15px}
  .mrow{
    display:flex;align-items:center;gap:14px;padding:11px 14px;border-radius:11px;text-decoration:none;color:var(--ink);
    background:rgba(0,0,0,.28);border:1px solid var(--line);border-left:5px solid var(--c);transition:background .15s, border-color .15s;
  }
  .mrow:hover{background:rgba(255,255,255,.06);border-color:var(--c)}
  .mrow .mt{font-family:var(--inter);font-weight:700;font-size:18px;color:var(--c);font-variant-numeric:tabular-nums;flex:0 0 auto;min-width:52px;text-align:center;line-height:1.05}
  .mrow .mt small{display:block;color:var(--muted);font-size:11px;font-weight:600}
  .mrow .mc{flex:0 0 auto;width:170px;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mrow .mi{flex:1 1 auto;min-width:0;color:var(--muted);font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mrow .mg{flex:0 0 auto;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--c);white-space:nowrap}
  .mrow.cancel .mi{text-decoration:line-through}

  /* ===== B2B em SQUADS ===== */
  /* métricas como chips compactos clicáveis (substituem os cards no B2B) */
  .kpis.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start}
  .chip{display:flex;align-items:center;gap:8px;white-space:nowrap;cursor:pointer;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 12px 6px 10px;border-left:4px solid var(--c);transition:border-color .15s}
  .chip:hover{border-color:var(--c)}
  .chip b{font-family:var(--num);font-weight:700;font-size:24px;line-height:.85;color:var(--c);font-variant-numeric:tabular-nums}
  .chip span{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;line-height:1.1;white-space:normal;max-width:60px}

  /* grade de squads */
  .grid.squads{grid-template-columns:repeat(5,minmax(0,1fr));grid-template-rows:minmax(0,1fr)}
  .squad{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:16px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .squad-h{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 13px;border-bottom:1px solid var(--line)}
  .squad-h .nome{font-family:var(--num);font-weight:700;font-size:23px;letter-spacing:.02em;line-height:1}
  .squad-h .tag{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);background:rgba(255,106,26,.14);padding:4px 9px;border-radius:999px}
  .pessoa{display:flex;flex-direction:column;min-height:0;padding:8px 11px;border-bottom:1px solid var(--line)}
  .pessoa:last-child{border-bottom:none}
  .pessoa.lider{background:rgba(255,106,26,.06)}
  .p-h{display:flex;align-items:center;gap:7px;margin-bottom:6px}
  .p-nome{font-family:var(--inter);font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .p-lider{font-family:var(--inter);font-size:8.5px;font-weight:700;letter-spacing:.1em;color:var(--orange);background:rgba(255,106,26,.16);padding:2px 6px;border-radius:999px;flex:0 0 auto}
  .p-cnt{margin-left:auto;display:flex;gap:8px;font-family:var(--inter);font-size:10.5px;color:var(--muted);flex:0 0 auto}
  .p-cnt b{font-weight:700}
  .ag{display:flex;flex-direction:column;gap:3px;overflow:hidden;min-height:0}
  .ap2{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:7px;background:rgba(0,0,0,.28);border-left:3px solid var(--c);min-width:0;overflow:hidden;text-decoration:none;color:var(--ink);transition:background .15s}
  a.ap2[href]:hover{background:rgba(255,255,255,.06)}
  .ap2 .t{font-family:var(--inter);font-weight:700;font-size:13px;color:var(--c);font-variant-numeric:tabular-nums;flex:0 0 auto}
  .ap2 .c{font-size:12px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0}
  .ap2 .g{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--c);white-space:nowrap;flex:0 0 auto}
  .ap2.cancel .c{text-decoration:line-through;opacity:.7}
  .ag .vazio{color:var(--dim);font-size:11px;padding:2px}

  footer{position:fixed;right:14px;bottom:8px;color:var(--dim);font-size:10.5px;letter-spacing:.06em}
  footer b{color:var(--muted)}

  @media (max-width:900px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .grid{grid-template-columns:1fr;overflow:auto}
    body{overflow:auto;height:auto;min-height:100vh}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="live-dot"></span>
    <div>
      <h1>Agenda de Reuniões</h1>
      <small id="brandSub">Closers · acompanhamento ao vivo</small>
    </div>
  </div>
  <div class="controls">
    <nav class="tabs" id="segTabs">
      <button class="tab" data-seg="B2B">B2B</button>
      <button class="tab" data-seg="B2C">B2C</button>
    </nav>
    <nav class="tabs periodo" id="rangeTabs">
      <button class="tab" data-range="ontem">Ontem</button>
      <button class="tab" data-range="hoje">Hoje</button>
      <button class="tab" data-range="amanha">Amanhã</button>
      <button class="tab" data-range="semana">Semana</button>
      <button class="tab" data-range="mes">Mês</button>
    </nav>
  </div>
  <div class="clock">
    <div class="time" id="clock">--:--:--</div>
    <div class="date" id="date">—</div>
  </div>
</header>

<section class="kpis" id="kpis"></section>

<main class="grid" id="grid"></main>

<footer id="foot">Atualiza automaticamente a cada <b>30s</b> · dados de exemplo</footer>

<!-- pop-up: reuniões de um status (aberto ao clicar num KPI) -->
<div id="modal" class="modal" hidden>
  <div class="modal-bg" data-close></div>
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">—</div>
      <button class="modal-close" id="modalClose" aria-label="Fechar">×</button>
    </div>
    <div class="modal-list" id="modalList"></div>
  </div>
</div>

<script>
/* ============================================================
   1) FONTE DE DADOS
   ------------------------------------------------------------
   fetchMeetings() consulta o backend em /api/reunioes-hoje
   (a Private App do HubSpot fica no servidor, NUNCA no
   navegador da TV). Enquanto o backend não estiver pronto,
   cai automaticamente nos dados de exemplo.

   Formato esperado por closer:
   {
     nome, iniciais, cor, segmento,
     reunioes: [
       { titulo, contato, empresa, inicio: Date, fim: Date,
         outcome: "SCHEDULED" | "COMPLETED" | "NO_SHOW" }
     ]
   }
   ============================================================ */

async function fetchMeetings(){
  try{
    const r = await fetch('/api/reunioes-hoje?range='+encodeURIComponent(state.range), {cache:'no-store'});
    const raw = await r.json().catch(()=>null);
    if(r.ok && raw){
      const arr = Array.isArray(raw) ? raw : (raw.closers || []);
      if(arr.length){
        setFonte('HubSpot · ao vivo', true); // ok=true -> registra a sincronização
        return arr.map(c => ({
          ...c,
          reunioes:(c.reunioes||[]).map(m => ({...m, inicio:new Date(m.inicio), fim:new Date(m.fim)}))
        }));
      }
      setFonte('API sem closers configurados · dados de exemplo');
    } else {
      const msg = (raw && raw.error) ? raw.error : ('HTTP '+r.status);
      setFonte('erro na API ('+msg+') · dados de exemplo');
    }
  }catch(e){
    setFonte('API indisponível · dados de exemplo');
  }
  return gerarDadosDemo();
}

// Rodapé com a fonte dos dados e a hora da ÚLTIMA sincronização real.
// ok=true (fetch do HubSpot concluído) carimba o horário; erros não carimbam,
// então dá pra ver quando o painel parou de atualizar.
let ultimaSync = null;
let fonteAtual = 'dados de exemplo';
function setFonte(txt, ok){
  fonteAtual = txt;
  if(ok) ultimaSync = new Date();
  pintarRodape();
}
function pintarRodape(){
  const foot = document.getElementById('foot');
  if(!foot) return;
  let sync = '';
  if(ultimaSync){
    const hh = ultimaSync.toLocaleTimeString('pt-BR');
    const secs = Math.max(0, Math.round((Date.now()-ultimaSync.getTime())/1000));
    const atrasado = secs > 75 ? ' · <b style="color:var(--miss)">sincronização atrasada</b>' : '';
    sync = ` · sincronizado <b>${hh}</b> (há ${secs}s)${atrasado}`;
  }
  foot.innerHTML = `Atualiza a cada <b>30s</b> · ${fonteAtual}${sync}`;
}

/* ============================================================
   2) CÁLCULO DE STATUS (derivado do horário atual)
   ============================================================ */
function statusReuniao(m, agora){
  // Resultado registrado tem prioridade (bate com o relatório do HubSpot):
  if (m.outcome === "CANCELED")  return "CANCELADA";   // agendada mas cancelada
  if (m.outcome === "COMPLETED") return "REALIZADA";   // = "Concluído"
  if (m.outcome === "NO_SHOW")   return "PERDIDA";      // = "No-show"
  // Sem resultado ainda -> decide pelo horário:
  if (agora >= m.inicio && agora <= m.fim) return "AGORA";
  if (agora < m.inicio) return "FUTURA";
  return "PENDENTE"; // já passou do horário e ninguém marcou o resultado
}

// cor + rótulo de cada status (usado no modal)
function statusVisual(s){
  switch(s){
    case "AGORA":     return {cor:"var(--now)",  tag:"Em andamento"};
    case "REALIZADA": return {cor:"var(--done)", tag:"Realizada"};
    case "PERDIDA":   return {cor:"var(--miss)", tag:"No-show"};
    case "CANCELADA": return {cor:"var(--dim)",  tag:"Cancelada"};
    case "PENDENTE":  return {cor:"var(--muted)",tag:"A registrar"};
    default:          return {cor:"var(--sched)",tag:"Agendada"}; // FUTURA
  }
}

function resumoCloser(c, agora){
  const r = {agendadas:c.reunioes.length, realizadas:0, agora:0, futuras:0, perdidas:0, pendentes:0, canceladas:0};
  let emAndamento=null, aSeguir=null;
  const futuras=[];
  c.reunioes.forEach(m=>{
    const s = statusReuniao(m, agora);
    if(s==="REALIZADA") r.realizadas++;
    else if(s==="AGORA"){ r.agora++; emAndamento=m; }
    else if(s==="FUTURA"){ r.futuras++; futuras.push(m); }
    else if(s==="PERDIDA") r.perdidas++;
    else if(s==="PENDENTE") r.pendentes++;
    else if(s==="CANCELADA") r.canceladas++;
  });
  futuras.sort((a,b)=>a.inicio-b.inicio);
  aSeguir = futuras[0] || null;
  return {...r, emAndamento, aSeguir};
}

/* ============================================================
   3) RENDER
   ============================================================ */
const fmtHora = d => d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const fmtDia = d => d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
const fmtDow = d => d.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','');
const capitaliza = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
const ehMesmoDia = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const el = (html)=>{const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;};

// agrupa as reuniões do closer por dia (usado no resumo de Semana/Mês)
function agrupaPorDia(reunioes, agora){
  const byDay = new Map();
  reunioes.forEach(m=>{
    const key = m.inicio.toDateString();
    if(!byDay.has(key)) byDay.set(key, {dia:m.inicio, total:0, realizadas:0, agora:0, futuras:0, perdidas:0, pendentes:0, canceladas:0});
    const g = byDay.get(key);
    g.total++;
    const s = statusReuniao(m, agora);
    if(s==="REALIZADA") g.realizadas++;
    else if(s==="AGORA") g.agora++;
    else if(s==="FUTURA") g.futuras++;
    else if(s==="PERDIDA") g.perdidas++;
    else if(s==="PENDENTE") g.pendentes++;
    else if(s==="CANCELADA") g.canceladas++;
  });
  return [...byDay.values()].sort((a,b)=>a.dia-b.dia);
}

function faltamMin(d, agora){
  const m = Math.round((d - agora)/60000);
  if (m <= 0) return "começando";
  if (m < 60) return `em ${m} min`;
  const hh=Math.floor(m/60), mm=m%60;
  return `em ${hh}h${mm?(' '+mm+'min'):''}`;
}

/* estado: segmento (B2B/B2C) e período (hoje/amanha/semana/mes), via URL ou abas */
const RANGES = ['ontem','hoje','amanha','semana','mes'];
const RANGE_LABEL = {ontem:'ontem', hoje:'hoje', amanha:'amanhã', semana:'esta semana', mes:'este mês'};
const params = new URLSearchParams(location.search);
const state = {
  seg: (params.get('seg')||'B2B').toUpperCase(),
  range: (params.get('range')||'hoje').toLowerCase(),
};
if(!['B2B','B2C'].includes(state.seg)) state.seg='B2B';
if(!RANGES.includes(state.range)) state.range='hoje';

// nº de colunas ideal para caber tudo numa tela, conforme a quantidade de closers
function colsFor(n){
  const map={1:1,2:2,3:3,4:2,5:3,6:3,7:4,8:4,9:3,10:5,11:4,12:4};
  return map[n] || Math.ceil(Math.sqrt(n));
}

// contato + empresa, ocultando empresa vazia/traço (comum em B2C)
function metaContato(m){
  const emp = (m.empresa||'').trim();
  return (emp && emp!=='—') ? `${m.contato} · ${emp}` : m.contato;
}

function render(dados){
  const agora = new Date();

  // filtra pelo segmento ativo (B2B / B2C)
  const doSeg = dados.filter(c => c.segmento === state.seg);

  // atualiza abas (segmento + período) e subtítulo
  document.querySelectorAll('#segTabs .tab').forEach(b=>b.classList.toggle('active', b.dataset.seg===state.seg));
  document.querySelectorAll('#rangeTabs .tab').forEach(b=>b.classList.toggle('active', b.dataset.range===state.range));
  document.getElementById('brandSub').textContent = `Closers ${state.seg} · ${RANGE_LABEL[state.range]}`;

  // KPIs agregados do segmento
  const tot = {agendadas:0, realizadas:0, agora:0, futuras:0, perdidas:0, pendentes:0, canceladas:0};
  const resumos = doSeg.map(c=>{
    const r = resumoCloser(c, agora);
    tot.agendadas+=r.agendadas; tot.realizadas+=r.realizadas; tot.agora+=r.agora; tot.futuras+=r.futuras;
    tot.perdidas+=r.perdidas; tot.pendentes+=r.pendentes; tot.canceladas+=r.canceladas;
    return {c, r};
  });

  // Agendadas (total) = Realizadas + Em andamento + Futuras + No-show + A registrar + Canceladas.
  // Todos os baldes aparecem para a soma sempre fechar com o total.
  const kpiDefs = [
    {n:tot.agendadas, t:`Agendadas · ${RANGE_LABEL[state.range]}`, s:"Agendadas", c:"var(--sched)", k:"ALL"},
    {n:tot.realizadas, t:"Realizadas", s:"Realizadas", c:"var(--done)", k:"REALIZADA"},
    {n:tot.agora, t:"Em andamento", s:"Em andamento", c:"var(--now)", k:"AGORA"},
    {n:tot.futuras, t:"Futuras", s:"Futuras", c:"var(--next)", k:"FUTURA"},
    {n:tot.perdidas, t:"No-show", s:"No-show", c:"var(--miss)", k:"PERDIDA"},
    {n:tot.pendentes, t:"A registrar", s:"A registrar", c:"var(--muted)", k:"PENDENTE"},
    {n:tot.canceladas, t:"Canceladas", s:"Canceladas", c:"var(--dim)", k:"CANCELADA"},
  ];
  const chips = state.seg === 'B2B'; // B2B usa chips compactos; B2C usa cards
  const kpis = document.getElementById('kpis');
  kpis.className = chips ? 'kpis chips' : 'kpis';
  kpis.innerHTML='';
  kpiDefs.forEach(k=>{
    const node = chips
      ? el(`<div class="chip" style="--c:${k.c}" title="Ver reuniões"><b>${k.n}</b><span>${k.s}</span></div>`)
      : el(`<div class="kpi" style="--c:${k.c}" title="Ver reuniões"><div class="big">${k.n}</div><div class="lbl">${k.t}</div></div>`);
    node.addEventListener('click', ()=> abrirModal(k.k, k.t, k.c));
    kpis.appendChild(node);
  });

  const grid = document.getElementById('grid');
  grid.innerHTML='';

  // B2B: layout em squads (5 colunas, líder + membros). B2C: cards por closer.
  if(state.seg === 'B2B'){
    grid.className = 'grid squads';
    grid.style.gridTemplateColumns = '';
    grid.style.gridTemplateRows = '';
    renderSquads(resumos, agora);
    return;
  }

  // Cards — grade adaptativa ao número de closers do segmento
  grid.className = 'grid';
  const cols = colsFor(resumos.length);
  const rows = Math.max(1, Math.ceil(resumos.length/cols));
  grid.style.gridTemplateColumns = `repeat(${cols},minmax(0,1fr))`;
  grid.style.gridTemplateRows = `repeat(${rows},minmax(0,1fr))`;
  resumos.forEach(({c,r})=>{
    const emAndamento = !!r.emAndamento;

    // Semana/Mês: resumo por dia (contagem). Hoje/Amanhã: lista detalhada.
    const resumoPorDia = (state.range==="semana" || state.range==="mes");
    let linhas, nLinhas;
    if(resumoPorDia){
      const dias = agrupaPorDia(c.reunioes, agora);
      nLinhas = dias.length;
      linhas = dias.map(g=>{
        const hoje = ehMesmoDia(g.dia, agora);
        const cor = hoje ? "var(--now)" : "var(--sched)";
        const titulo = `${capitaliza(fmtDow(g.dia))} · ${fmtDia(g.dia)}`;
        const partes=[];
        if(g.realizadas) partes.push(`${g.realizadas} realiz.`);
        if(g.agora) partes.push(`${g.agora} agora`);
        if(g.futuras) partes.push(`${g.futuras} agend.`);
        if(g.pendentes) partes.push(`${g.pendentes} a registrar`);
        if(g.perdidas) partes.push(`${g.perdidas} no-show`);
        if(g.canceladas) partes.push(`${g.canceladas} cancel.`);
        const sub = partes.join(" · ") || "—";
        return `<div class="appt" style="--c:${cor}">
          <div class="time"><span class="ini">${g.total}</span><span class="fim">reun.</span></div>
          <div class="info"><div class="t">${titulo}</div><div class="c">${sub}</div></div>
          <div class="tag">${hoje?"Hoje":""}</div>
        </div>`;
      }).join('');
    } else {
      // lista detalhada (Hoje / Amanhã), ordenada por horário
      const reunioesOrdenadas = [...c.reunioes].sort((a,b)=>a.inicio-b.inicio);
      nLinhas = reunioesOrdenadas.length;
      let jaMarcouProxima=false;
      linhas = reunioesOrdenadas.map(m=>{
        const s = statusReuniao(m, agora);
        let cor, tag, cls="";
        if(s==="AGORA"){ cor="var(--now)"; tag="Agora"; cls="live"; }
        else if(s==="REALIZADA"){ cor="var(--done)"; tag="Realizada"; cls="past"; }
        else if(s==="PERDIDA"){ cor="var(--miss)"; tag="No-show"; cls="past"; }
        else if(s==="CANCELADA"){ cor="var(--dim)"; tag="Cancelada"; cls="past cancel"; }
        else if(s==="PENDENTE"){ cor="var(--muted)"; tag="A registrar"; cls=""; }
        else { // FUTURA
          cor="var(--sched)";
          // "em X min" só faz sentido hoje; amanhã mostra "Agendada"
          if(state.range==='hoje' && !emAndamento && !jaMarcouProxima){ tag=faltamMin(m.inicio, agora); jaMarcouProxima=true; }
          else { tag="Agendada"; }
        }
        // mais clean: nome do contato vinculado (cai no título só se não houver contato)
        const nomeLinha = (m.contato && m.contato!=='—') ? m.contato : (m.titulo||'Reunião');
        const emp = (m.empresa||'').trim();
        const subLinha = (emp && emp!=='—') ? `<div class="c">${emp}</div>` : '';
        const href = m.link ? ` href="${m.link}" target="_blank" rel="noopener"` : '';
        return `<a class="appt ${cls}" style="--c:${cor}"${href}>
          <div class="time"><span class="ini">${fmtHora(m.inicio)}</span></div>
          <div class="info"><div class="t">${nomeLinha}</div>${subLinha}</div>
          <div class="tag">${tag}</div>
        </a>`;
      }).join('');
    }
    const dens = nLinhas >= 9 ? ' grade' : (nLinhas >= 7 ? ' dense' : (nLinhas >= 5 ? ' compact' : ''));
    const vazio = state.range==='hoje' ? 'Nenhuma reunião hoje' : `Nenhuma reunião ${RANGE_LABEL[state.range]}`;
    const agendaHTML = linhas
      ? `<div class="agenda${dens}">${linhas}</div>`
      : `<div class="agenda empty-day">${vazio}</div>`;

    const card = el(`<div class="card ${emAndamento?'is-now':''}">
      <div class="who">
        <div>
          <div class="name">${c.nome}</div>
        </div>
        <div class="badge ${emAndamento?'now':'free'}">
          <span class="b-dot"></span>${emAndamento?'Ocupado':'Disponível'}
        </div>
      </div>

      <div class="stats">
        <div class="stat" style="--c:var(--sched)"><div class="n">${r.agendadas}</div><div class="t">Agend.</div></div>
        <div class="stat" style="--c:var(--done)"><div class="n">${r.realizadas}</div><div class="t">Realiz.</div></div>
        <div class="stat" style="--c:var(--now)"><div class="n">${r.agora}</div><div class="t">Agora</div></div>
        <div class="stat" style="--c:var(--next)"><div class="n">${r.futuras}</div><div class="t">Futuras</div></div>
        <div class="stat" style="--c:var(--miss)"><div class="n">${r.perdidas}</div><div class="t">No-show</div></div>
      </div>

      ${agendaHTML}
    </div>`);
    grid.appendChild(card);
  });
}

/* ============================================================
   3a) B2B EM SQUADS — 5 colunas (líder + membros)
   ============================================================ */
function renderSquads(resumos, agora){
  const grid = document.getElementById('grid');
  const porSquad = new Map();
  resumos.forEach(x=>{
    const si = (x.c.squad==null) ? 99 : x.c.squad;
    if(!porSquad.has(si)) porSquad.set(si, []);
    porSquad.get(si).push(x);
  });
  const ordenados = [...porSquad.entries()].sort((a,b)=>a[0]-b[0]);
  grid.innerHTML = ordenados.map(([si, membros])=>{
    membros.sort((a,b)=> (b.c.lider?1:0)-(a.c.lider?1:0)); // líder primeiro
    const lider = membros.find(m=>m.c.lider) || membros[0];
    const nomeSquad = lider?.c.squadNome || (lider?.c.nome || 'Squad').split(' ')[0];
    return `<div class="squad">
      <div class="squad-h"><span class="nome">${nomeSquad}</span><span class="tag">Squad</span></div>
      ${membros.map(({c,r})=>pessoaBlock(c, r, agora)).join('')}
    </div>`;
  }).join('');
}
function pessoaBlock(c, r, agora){
  const reun = [...c.reunioes].sort((a,b)=>a.inicio-b.inicio);
  const linhas = reun.length ? reun.map(m=>{
    const s = statusReuniao(m, agora);
    const v = statusVisual(s);
    const emp = (m.empresa||'').trim();
    const info = (emp && emp!=='—') ? `${m.contato} · ${emp}` : (m.contato || m.titulo || '—');
    const href = m.link ? ` href="${m.link}" target="_blank" rel="noopener"` : '';
    const cls = s==='CANCELADA' ? 'ap2 cancel' : 'ap2';
    return `<a class="${cls}" style="--c:${v.cor}"${href}><span class="t">${fmtHora(m.inicio)}</span><span class="c">${info}</span><span class="g">${v.tag}</span></a>`;
  }).join('') : `<div class="vazio">Sem reuniões</div>`;
  return `<div class="pessoa ${c.lider?'lider':''}">
    <div class="p-h">
      <span class="p-nome">${c.nome}</span>${c.lider?'<span class="p-lider">Líder</span>':''}
      <span class="p-cnt"><span><b>${r.agendadas}</b> ag</span><span style="color:var(--done)"><b>${r.realizadas}</b> re</span><span style="color:var(--sched)"><b>${r.futuras}</b> fu</span></span>
    </div>
    <div class="ag">${linhas}</div>
  </div>`;
}

/* ============================================================
   3b) MODAL — reuniões de um status (ao clicar num KPI)
   ============================================================ */
function abrirModal(key, titulo, cor){
  const agora = new Date();
  const doSeg = (cache||[]).filter(c => c.segmento === state.seg);
  const itens = [];
  doSeg.forEach(c => c.reunioes.forEach(m => {
    const s = statusReuniao(m, agora);
    if(key==='ALL' || s===key) itens.push({c, m, s});
  }));
  itens.sort((a,b)=> a.m.inicio - b.m.inicio);

  const multiDia = state.range!=='hoje';
  const lista = document.getElementById('modalList');
  if(!itens.length){
    lista.innerHTML = `<div class="modal-empty">Nenhuma reunião neste status.</div>`;
  } else {
    lista.innerHTML = itens.map(({c,m,s})=>{
      const v = statusVisual(s);
      const emp = (m.empresa||'').trim();
      const info = (emp && emp!=='—') ? `${m.contato} · ${emp}` : (m.contato||m.titulo||'—');
      const dia = multiDia ? `<small>${fmtDia(m.inicio)}</small>` : '';
      const href = m.link ? ` href="${m.link}" target="_blank" rel="noopener"` : '';
      const cls = s==='CANCELADA' ? ' cancel' : '';
      return `<a class="mrow${cls}" style="--c:${v.cor}"${href}>
        <span class="mt">${fmtHora(m.inicio)}${dia}</span>
        <span class="mc">${c.nome}</span>
        <span class="mi">${info}</span>
        <span class="mg">${v.tag}</span>
      </a>`;
    }).join('');
  }
  document.getElementById('modalTitle').innerHTML =
    `${titulo} · <b>${itens.length}</b>`;
  const modal = document.getElementById('modal');
  modal.style.setProperty('--c', cor || 'var(--ink)');
  modal.hidden = false;
}
function fecharModal(){ document.getElementById('modal').hidden = true; }
document.querySelectorAll('#modal [data-close], #modalClose').forEach(elm=>{
  elm.addEventListener('click', fecharModal);
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') fecharModal(); });

/* ============================================================
   4) RELÓGIO + CICLO DE ATUALIZAÇÃO
   ============================================================ */
function tickRelogio(){
  const now=new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR');
  document.getElementById('date').textContent =
    now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
}

let cache=null;
async function atualizar(){
  cache = await fetchMeetings();
  render(cache);
}

// relógio a cada segundo; re-render (recalcula "agora") a cada segundo com cache;
// atualiza o "há Xs" do rodapé; busca nova no backend a cada 30s
setInterval(()=>{ tickRelogio(); pintarRodape(); if(cache) render(cache); }, 1000);
setInterval(atualizar, 30000);

// abas de SEGMENTO: filtro no cliente (só re-renderiza) e grava na URL
// (cada TV pode abrir fixa em ?seg=b2b ou ?seg=b2c e nunca precisar de clique)
document.querySelectorAll('#segTabs .tab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    state.seg = btn.dataset.seg;
    const u = new URL(location); u.searchParams.set('seg', state.seg.toLowerCase());
    history.replaceState({}, '', u);
    if(cache) render(cache);
  });
});

// abas de PERÍODO: muda a janela no backend, então re-busca (?range=...)
document.querySelectorAll('#rangeTabs .tab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    if(state.range===btn.dataset.range) return;
    state.range = btn.dataset.range;
    const u = new URL(location); u.searchParams.set('range', state.range);
    history.replaceState({}, '', u);
    atualizar(); // busca a nova janela e re-renderiza
  });
});

tickRelogio();
atualizar();
</script>
</body>
</html>
